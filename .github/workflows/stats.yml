name: Refresh Profile Stats
on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

concurrency:
  group: profile-stats
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Test stats updater
        run: python3 -m unittest discover -s tests -v
      - name: Refresh public profile metrics
        env:
          GH_LOGIN: jeancecilia
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update_stats.py

      - name: Commit changes if updated
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/index.html
          if git diff --cached --quiet; then
            echo "Profile stats are already current."
            exit 0
          fi
          git commit -m "chore(stats): refresh profile metrics"
          git pull --rebase origin main
          git push origin HEAD:main
